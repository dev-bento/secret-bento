name: Ensure Safe Handoff Review product

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ensure-product:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft product when absent
        shell: pwsh
        env:
          POLAR_OAT: ${{ secrets.POLAR_OAT }}
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          if ([string]::IsNullOrWhiteSpace($env:POLAR_OAT)) {
            throw "POLAR_OAT is required."
          }

          $api = "https://api.polar.sh/v1"
          $headers = @{
            Authorization = "Bearer $($env:POLAR_OAT)"
            Accept = "application/json"
            "Content-Type" = "application/json"
          }
          $referenceProductId = "d1574a9d-d898-4b63-bf7a-7ecd787c3996"
          $reference = Invoke-RestMethod -Method Get -Uri "$api/products/$referenceProductId" -Headers $headers

          $products = Invoke-RestMethod -Method Get -Uri "$api/products/?organization_id=$($reference.organization_id)&limit=100" -Headers $headers
          $existing = $products.items | Where-Object {
            $slugProperty = $_.metadata.psobject.Properties["offer_slug"]
            $null -ne $slugProperty -and $slugProperty.Value -eq "safe-handoff-review-pilot"
          }

          if (@($existing).Count -gt 1) {
            throw "Multiple Safe Handoff Review pilot products already exist."
          }
          if (@($existing).Count -eq 1) {
            Write-Host "Safe Handoff Review already exists: $($existing.id)"
            return
          }

          $description = @"
Guided 20-30 minute setup for AI-built applications. We run a local secret scan, prepare a redacted AI handoff, separate AI-safe changes from human-only actions, support approved limited edits, and re-scan.

Not included: a security audit, a guarantee that every secret is detected, credential rotation, billing investigation, production dashboard changes, Git history rewriting, or a guarantee that publishing is safe.
"@

          $body = @{
            name = "Safe Handoff Review"
            description = $description.Trim()
            visibility = "draft"
            organization_id = $reference.organization_id
            metadata = @{
              offer_slug = "safe-handoff-review-pilot"
              offer_type = "guided_service"
              pilot_slots = 3
              pilot_price_jpy = 4980
            }
            prices = @(
              @{
                amount_type = "fixed"
                price_currency = "jpy"
                price_amount = 4980
              }
            )
          }

          $created = Invoke-RestMethod -Method Post -Uri "$api/products/" -Headers $headers -Body ($body | ConvertTo-Json -Depth 10)
          if ($created.name -ne "Safe Handoff Review" -or $created.visibility -ne "draft") {
            throw "Polar returned an unexpected product after creation."
          }
          if ($created.prices[0].price_currency -ne "jpy" -or $created.prices[0].price_amount -ne 4980) {
            throw "Polar returned an unexpected price after creation."
          }

          Write-Host "Created draft Safe Handoff Review product: $($created.id)"
