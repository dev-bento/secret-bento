name: Polar release gate
on:
  workflow_dispatch:
    inputs:
      version:
        description: Existing final CLI release version (without v)
        required: true
        type: string
      promote:
        description: Update Polar metadata after validation
        required: true
        default: false
        type: boolean
      ensure_service_product:
        description: Create the draft JPY 4,980 Safe Handoff Review when absent
        required: true
        default: false
        type: boolean
permissions:
  contents: write
concurrency:
  group: polar-release-production
  cancel-in-progress: false
jobs:
  ensure-service-product:
    if: inputs.ensure_service_product
    runs-on: ubuntu-latest
    steps:
      - name: Create draft product when absent
        shell: pwsh
        env:
          POLAR_OAT: ${{ secrets.POLAR_OAT }}
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest
          $api = "https://api.polar.sh/v1"
          $headers = @{ Authorization = "Bearer $($env:POLAR_OAT)"; Accept = "application/json"; "Content-Type" = "application/json" }
          $reference = Invoke-RestMethod -Method Get -Uri "$api/products/d1574a9d-d898-4b63-bf7a-7ecd787c3996" -Headers $headers
          $products = Invoke-RestMethod -Method Get -Uri "$api/products/?organization_id=$($reference.organization_id)&limit=100" -Headers $headers
          $existing = $products.items | Where-Object {
            $slug = $_.metadata.psobject.Properties["offer_slug"]
            $null -ne $slug -and $slug.Value -eq "safe-handoff-review-pilot"
          }
          if (@($existing).Count -gt 1) { throw "Multiple Safe Handoff Review pilot products exist." }
          if (@($existing).Count -eq 1) { Write-Host "Safe Handoff Review already exists: $($existing.id)"; return }
          $body = @{
            name = "Safe Handoff Review"
            description = "Guided 20-30 minute setup for AI-built applications: local secret scan, redacted AI handoff, AI-safe versus human-only actions, approved limited edit support, and re-scan. Not a security audit or a guarantee that every secret is detected or publishing is safe. Credential rotation, billing investigations, production dashboard changes, and Git history rewriting are not included."
            visibility = "draft"
            metadata = @{ offer_slug = "safe-handoff-review-pilot"; offer_type = "guided_service"; pilot_slots = 3; pilot_price_jpy = 4980 }
            prices = @(@{ amount_type = "fixed"; price_currency = "jpy"; price_amount = 4980 })
          }
          $created = Invoke-RestMethod -Method Post -Uri "$api/products/" -Headers $headers -Body ($body | ConvertTo-Json -Depth 10)
          if ($created.visibility -ne "draft" -or $created.prices[0].price_currency -ne "jpy" -or $created.prices[0].price_amount -ne 4980) {
            throw "Polar returned an unexpected product configuration."
          }
          Write-Host "Created draft Safe Handoff Review product: $($created.id)"

  validate-and-promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release automation
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build release manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $commit = git rev-list -n 1 "v${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($commit)) {
            throw "Tag v${{ inputs.version }} was not found."
          }
          $manifest = [ordered]@{
            schema_version = 1
            product = "secret-bento"
            cli_version = "${{ inputs.version }}"
            git_tag = "v${{ inputs.version }}"
            git_commit = $commit
            crate = @{ name = "secret-bento"; version = "${{ inputs.version }}" }
            github_release = @{ tag = "v${{ inputs.version }}" }
            polar = @{ product_id = "d1574a9d-d898-4b63-bf7a-7ecd787c3996" }
            status = if ([System.Convert]::ToBoolean("${{ inputs.promote }}")) { "released" } else { "staged" }
          }
          New-Item -ItemType Directory -Force dist | Out-Null
          $manifest | ConvertTo-Json -Depth 10 | Set-Content -Encoding utf8NoBOM dist/release-manifest.json
          $hash = (Get-FileHash -Algorithm SHA256 dist/release-manifest.json).Hash.ToLowerInvariant()
          "$hash  release-manifest.json" | Set-Content -Encoding ascii dist/SHA256SUMS.txt
          "git_commit=$commit" >> $env:GITHUB_ENV
          "manifest_sha256=$hash" >> $env:GITHUB_ENV
      - name: Validate all release authorities
        shell: pwsh
        env:
          POLAR_OAT: ${{ secrets.POLAR_OAT }}
        run: ./scripts/polar-release.ps1 -Mode Validate -Version '${{ inputs.version }}' -GitCommit '${{ env.git_commit }}' -ManifestSha256 '${{ env.manifest_sha256 }}'
      - name: Promote Polar product
        if: inputs.promote
        shell: pwsh
        env:
          POLAR_OAT: ${{ secrets.POLAR_OAT }}
        run: ./scripts/polar-release.ps1 -Mode Promote -Version '${{ inputs.version }}' -GitCommit '${{ env.git_commit }}' -ManifestSha256 '${{ env.manifest_sha256 }}'
      - name: Publish manifest for the landing page
        if: inputs.promote
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v${{ inputs.version }}" dist/release-manifest.json dist/SHA256SUMS.txt --clobber
      - name: Preserve release evidence
        uses: actions/upload-artifact@v4
        with:
          name: polar-release-evidence-v${{ inputs.version }}
          path: |
            dist/release-manifest.json
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 90
